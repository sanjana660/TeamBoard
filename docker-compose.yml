services:
  postgres:
    image: postgres:16
    container_name: teamboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teamboard_db
      POSTGRES_USER: teamboard_user
      POSTGRES_PASSWORD: teamboard_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamboard_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
